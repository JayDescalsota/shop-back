name: Build Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE" "${{ github.sha }}")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          SERVICES=$(echo "$CHANGED_FILES" | grep '^services/' | cut -d/ -f2 | sort -u)

          if echo "$CHANGED_FILES" | grep -qE '^(go\.(mod|sum)|Dockerfile|\.github/)'; then
            SERVICES="gateway auth users vehicles bookings repair inventory parts-marketplace payments payroll lookup notifications search staff"
          fi

          if [ -z "$SERVICES" ]; then
            echo 'matrix=[]' >> $GITHUB_OUTPUT
            echo "No service changes detected."
            exit 0
          fi

          MATRIX=$(printf '%s\n' "$SERVICES" | jq -R . | jq -s -c .)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Building: $SERVICES"

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ matrix.service }}-service:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER }}/${{ matrix.service }}-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
