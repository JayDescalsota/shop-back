name: Build All Services

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - auth
          - users
          - inventory
          - bookings
          - repair
          - payments
          - payroll
          - vehicles
          - staff
          - notifications
          - lookup
          - search
          - parts-marketplace

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ matrix.service }}-service:latest
            ghcr.io/${{ env.REPO_OWNER }}/${{ matrix.service }}-service:${{ github.sha }}